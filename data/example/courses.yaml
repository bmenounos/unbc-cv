# Courses taught at UNBC
# Section 8 of UNBC CV format
# sessions: most recent first
# labs/tutorials/other: null = not applicable
# year_start/year_end: used instead of year when a session spans multiple years

course_descriptions:
  GEOG-100:  "Environments and People — The Geography of Natural Hazards. Introduces geophysical processes that pose risk to humans, including earthquakes, volcanoes, floods, landslides, coastal processes, climate change, and severe weather events."
  GEOG-111:  "Theory and Practice of Physical Geography. Allows new BSc Geography majors to develop student and faculty contacts and improve mentoring and degree advising."
  GEOG-210:  "Introduction to Geomorphology. Introductory course on how surface processes operate to create the diverse landscape we see today."
  GEOG-310:  "Introduction to Hydrology. The physical properties of water, its variable states, and interaction with the atmosphere, biota, surface, and subsurface of the earth."
  GEOG-311:  "Drainage Basin Geomorphology. Focuses on hillslope and fluvial processes in drainage basins; laboratory exercises emphasize analytical and statistical techniques."
  GEOG-333:  "Special Topics in Physical Geography."
  GEOG-411/611: "Quaternary and Surficial Geology. Major processes that have shaped the landscape of western Canada over the past two million years. Topics include ice dynamics, glacier mass balance, radiometric dating, and methods of paleo-environmental reconstruction."
  GEOG-430:  "Undergraduate Thesis (two semesters for 5.0 hours/week)."
  GEOG-499/699: "Directed Readings / Special Topics."
  NRES-705:  "Graduate seminar."
  NRES-763:  "Graduate special topics."
  NRES-798:  "Graduate directed readings."
  NRES-799:  "Graduate directed readings."
  NRES-804:  "Graduate seminar."

